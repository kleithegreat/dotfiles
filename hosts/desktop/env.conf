# Environment Variables — Desktop (dedicated NVIDIA)

# Qt — hyprqt6engine provides fonts/icons/dialogs; Kvantum paints widgets
env = QT_QPA_PLATFORMTHEME, hyprqt6engine
env = QT_STYLE_OVERRIDE, kvantum

# Wayland / XDG
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland
env = ELECTRON_OZONE_PLATFORM_HINT, auto

# GPU — dedicated NVIDIA
env = LIBVA_DRIVER_NAME, nvidia
env = GBM_BACKEND, nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME, nvidia
env = NVD_BACKEND, direct

# App compatibility
env = _JAVA_AWT_WM_NONREPARENTING,1
env = MOZ_ENABLE_WAYLAND,1

# Desktop-specific autostart
exec-once = solaar config "MX Master 2S" smart-shift 50

exec-once = $cleanSessionEnv solaar -w hide
exec-once = $cleanSessionEnv desktopctl hypr lid-switch sync --internal eDP-1
# The MX Master 2S caps smart-shift at 50; Solaar documents that as always ratcheted.
exec-once = $cleanSessionEnv solaar config "MX Master 2S" scroll-ratchet Ratcheted
exec-once = $cleanSessionEnv solaar config "MX Master 2S" smart-shift 50

# Laptop-specific input settings

input {
    touchpad {
        natural_scroll = yes
        scroll_factor = 0.25
    }
}

gesture = 3, horizontal, workspace
gesture = 3, up, dispatcher, hyprexpo:expo, toggle

# When lid handling is inhibited, logind no longer suspends on close; keep the
# hidden internal panel out of the Hyprland layout while an external output is active.
bindl = , switch:on:Lid Switch, exec, desktopctl hypr lid-switch closed --internal eDP-1
bindl = , switch:off:Lid Switch, exec, desktopctl hypr lid-switch open --internal eDP-1

device {
    name = logitech-mx-master-2s-1
    sensitivity = -0.2
}

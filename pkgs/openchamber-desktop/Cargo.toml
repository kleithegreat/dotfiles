[package]
name = "openchamber-desktop"
version = "1.11.4"
edition = "2021"
publish = false

[[bin]]
name = "openchamber-desktop"
path = "src/main.rs"

[dependencies]
anyhow = "1"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-single-instance = "2"
url = "2"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true

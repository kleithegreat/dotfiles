# Session — import SSH_AUTH_SOCK from systemd (set by gcr-ssh-agent.socket) and
# propagate the full environment to D-Bus + systemd, so gnome-keyring and other
# D-Bus-activated services see all session variables.
exec-once = sh -c 'eval $(systemctl --user show-environment | grep SSH_AUTH_SOCK) && dbus-update-activation-environment --systemd --all'
exec-once = systemctl --user start hyprpolkitagent
exec-once = desktopctl brightness seed
exec-once = desktopctl daemon &
exec-once = desktopctl launch-quickshell

exec-once = vicinae server

# Wallpaper
exec-once = swww-daemon && sleep 0.5 && swww img ~/repos/dotfiles/wallpapers/lmao.png

# Idle & lock
exec-once = hypridle

# Window switcher
exec-once = snappy-switcher --daemon

# Audio
exec-once = easyeffects --service-mode --hide-window

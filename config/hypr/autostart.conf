$cleanSessionEnv = env -u HL_INITIAL_WORKSPACE_TOKEN -u XDG_ACTIVATION_TOKEN -u DESKTOP_STARTUP_ID

# Session — import SSH_AUTH_SOCK from systemd (set by gcr-ssh-agent.socket),
# scrub one-shot launch/workspace tokens, then propagate the remaining full
# environment to D-Bus + systemd before starting activation-sensitive user units.
exec-once = $cleanSessionEnv sh -c 'eval "$(systemctl --user show-environment | grep "^SSH_AUTH_SOCK=" || true)"; dbus-update-activation-environment --systemd --all; dbus-update-activation-environment HL_INITIAL_WORKSPACE_TOKEN= XDG_ACTIVATION_TOKEN= DESKTOP_STARTUP_ID=; systemctl --user unset-environment HL_INITIAL_WORKSPACE_TOKEN XDG_ACTIVATION_TOKEN DESKTOP_STARTUP_ID; systemctl --user start graphical-session.target xdg-desktop-portal.service xdg-desktop-portal-hyprland.service xdg-desktop-portal-gtk.service hyprpolkitagent'
exec-shutdown = systemctl --user stop graphical-session.target
exec-once = $cleanSessionEnv desktopctl daemon &
exec-once = $cleanSessionEnv desktopctl launch-quickshell

exec-once = $cleanSessionEnv vicinae server

# Wallpaper
exec-once = $cleanSessionEnv sh -c 'awww-daemon & sleep 0.5; desktopctl theme wallpaper'

# Idle & lock
exec-once = $cleanSessionEnv hypridle

# Window switcher
exec-once = $cleanSessionEnv snappy-switcher --daemon

# Host-specific autostart hooks
source = ~/.config/hypr/autostart-host.conf

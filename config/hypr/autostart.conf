# Session
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user start hyprpolkitagent
exec-once = brightnessctl -d intel_backlight -m > /tmp/quickshell-brightness

exec-once = quickshell

# Wallpaper
exec-once = swww-daemon && sleep 0.5 && swww img ~/repos/dotfiles/wallpapers/lmao.png

# Idle & lock
exec-once = hypridle

# Vicinae — started via systemd user service (services.vicinae.enable)

# Audio
exec-once = easyeffects --gapplication-service
general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Dim screen after 5 minutes
listener {
    timeout = 300
    on-timeout = ~/.local/bin/dim-screen.sh
    on-resume = bash -c 'kill $(cat /tmp/dim-screen.pid 2>/dev/null) 2>/dev/null; brightnessctl -d intel_backlight -r; brightnessctl -d intel_backlight -m > /tmp/quickshell-brightness'
}

# Lock after 10 minutes
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# DPMS off after 15 minutes
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# Suspend after 30 minutes
listener {
    timeout = 1800
    on-timeout = systemctl suspend
}
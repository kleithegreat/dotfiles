# Window Rules

# Float utility windows
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class com.github.wwmm.easyeffects, float on
windowrule = match:class imv, float on
windowrule = match:class f3d, float on
windowrule = match:class org.kde.ark, float on
windowrule = match:class org.kde.filelight, float on

# Float and center dialogs
windowrule = match:class hyprland-polkitagent, float on, center on
windowrule = match:class org.gnome.World.Secrets, float on, center on
windowrule = match:class org.kde.kcharselect, float on, center on
windowrule = match:class org.kde.isoimagewriter, float on, center on

# KDE portal file picker
windowrule = match:class org.freedesktop.impl.portal.desktop.kde, float on, size 900 600, center on

# Zoom
windowrule = match:class zoom, float on
windowrule = match:class zoom, match:title Zoom Meeting, size 1200 800, center on

# KDE system tools
windowrule = match:class org.kde.plasma-systemmonitor, float on
windowrule = match:class org.kde.kompare, float on
windowrule = match:class org.kde.partitionmanager, float on

# Layer Rules
# Quickshell blur (uncomment when Quickshell is running)
# layerrule = match:namespace quickshell:.*, blur on
# layerrule = match:namespace quickshell:.*, ignorealpha 0.79

# Disable hyprbars on tiled windows (bars only on floating)
windowrule {
    name = no-hyprbars-on-tiled
    hyprbars:no_bar = true
    match:float = false
}

layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}

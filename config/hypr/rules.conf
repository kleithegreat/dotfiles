# Window Rules

# Float utility windows
windowrule = match:class org.pulseaudio.pavucontrol, float on
windowrule = match:class com.github.wwmm.easyeffects, float on
windowrule = match:class imv, float on
windowrule = match:class f3d, float on
windowrule = match:class org.kde.ark, float on
windowrule = match:class org.kde.filelight, float on

# Float and center dialogs
# hyprpolkitagent sets no app_id (empty class); match its Qt application name.
windowrule = match:title Hyprland Polkit Agent, float on, center on
windowrule = match:class org.gnome.World.Secrets, float on, center on
windowrule = match:class org.kde.kcharselect, float on, center on
windowrule = match:class org.kde.isoimagewriter, float on, center on

# KDE portal file picker
windowrule = match:class org.freedesktop.impl.portal.desktop.kde, float on, size 900 600, center on

# Bitwarden
windowrule = match:class Bitwarden, float on, center on
windowrule = match:class chrome-nngceckbapebfimnlniiiahkandclblb-Default, float on, size 440 720, center on

# Zoom
windowrule = match:class zoom, float on
windowrule = match:class zoom, match:title Zoom Meeting, size 1200 800, center on

# System tools
windowrule = match:class io.missioncenter.MissionCenter, float on
windowrule = match:class org.kde.kompare, float on
windowrule = match:class org.kde.partitionmanager, float on

windowrule = match:class google-chrome, match:title \(Incognito\), float on

# Old XWayland Minecraft clients need true fullscreen to cover reserved bar space.
windowrule = match:class ^(Minecraft 1\.10\.2)$, fullscreen_state 2 2

# Layer Rules
# Quickshell blur. ignore_alpha 0.79 keeps blur on the near-opaque panels
# (bar is 0.92) while skipping transparent margins and the full-screen
# popup-overlay gaps, so rounded corners get no blur halo.
layerrule {
    name = quickshell-blur
    blur = on
    ignore_alpha = 0.79
    match:namespace = quickshell:.*
}

# Disable hyprbars on apps with client-side decorations
windowrule = match:class code, hyprbars:no_bar true
windowrule = match:class obsidian, hyprbars:no_bar true
windowrule = match:class org.gnome.Nautilus, hyprbars:no_bar true

# Disable hyprbars on tiled windows (bars only on floating)
windowrule {
    name = no-hyprbars-on-tiled
    hyprbars:no_bar = true
    match:float = false
}

layerrule {
    name = vicinae-blur
    blur = on
    ignore_alpha = 0
    match:namespace = vicinae
}

layerrule {
    name = vicinae-no-animation
    no_anim = on
    match:namespace = vicinae
}

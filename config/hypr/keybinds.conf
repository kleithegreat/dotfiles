# Keybinds

$mainMod = SUPER
$terminal = alacritty
$fileManager = dolphin
# $launcher = vicinae

# Core
bindd = $mainMod, Q, Open terminal, exec, $terminal
bindd = $mainMod, C, Close active window, killactive,
bindd = $mainMod, M, Exit Hyprland, exit,
bindd = $mainMod, E, Open file manager, exec, $fileManager
bindd = $mainMod, V, Toggle floating window, exec, desktopctl hypr toggle-float
bindd = $mainMod, R, Open app launcher, exec, vicinae open
bindd = $mainMod, P, Toggle pseudotile, pseudo,
bindd = $mainMod, J, Toggle split orientation, layoutmsg, togglesplit
bindd = $mainMod, N, Open Neovide, exec, neovide

# Focus
bindd = $mainMod, left, Move focus left, movefocus, l
bindd = $mainMod, right, Move focus right, movefocus, r
bindd = $mainMod, up, Move focus up, movefocus, u
bindd = $mainMod, down, Move focus down, movefocus, d

# Workspaces
bindd = $mainMod, 1, Switch to workspace 1, workspace, 1
bindd = $mainMod, 2, Switch to workspace 2, workspace, 2
bindd = $mainMod, 3, Switch to workspace 3, workspace, 3
bindd = $mainMod, 4, Switch to workspace 4, workspace, 4
bindd = $mainMod, 5, Switch to workspace 5, workspace, 5
bindd = $mainMod, 6, Switch to workspace 6, workspace, 6
bindd = $mainMod, 7, Switch to workspace 7, workspace, 7
bindd = $mainMod, 8, Switch to workspace 8, workspace, 8
bindd = $mainMod, 9, Switch to workspace 9, workspace, 9
bindd = $mainMod, 0, Switch to workspace 10, workspace, 10

bindd = $mainMod ALT, left, Previous workspace, workspace, e-1
bindd = $mainMod ALT, right, Next workspace, workspace, e+1

# Move window to workspace
bindd = $mainMod SHIFT, 1, Move window to workspace 1, movetoworkspace, 1
bindd = $mainMod SHIFT, 2, Move window to workspace 2, movetoworkspace, 2
bindd = $mainMod SHIFT, 3, Move window to workspace 3, movetoworkspace, 3
bindd = $mainMod SHIFT, 4, Move window to workspace 4, movetoworkspace, 4
bindd = $mainMod SHIFT, 5, Move window to workspace 5, movetoworkspace, 5
bindd = $mainMod SHIFT, 6, Move window to workspace 6, movetoworkspace, 6
bindd = $mainMod SHIFT, 7, Move window to workspace 7, movetoworkspace, 7
bindd = $mainMod SHIFT, 8, Move window to workspace 8, movetoworkspace, 8
bindd = $mainMod SHIFT, 9, Move window to workspace 9, movetoworkspace, 9
bindd = $mainMod SHIFT, 0, Move window to workspace 10, movetoworkspace, 10

# Scroll workspaces
bindd = $mainMod, mouse_down, Next workspace, workspace, e+1
bindd = $mainMod, mouse_up, Previous workspace, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Brightness via desktopctl; backend handles backlight/DDC and Quickshell OSD.
bindde = $mainMod, F6, Decrease brightness, exec, desktopctl brightness down
bindde = $mainMod, F7, Increase brightness, exec, desktopctl brightness up

# Volume
bindde = $mainMod, F2, Decrease volume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindde = $mainMod, F3, Increase volume, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindd = $mainMod, F1, Toggle mute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Media
bindd = $mainMod, F4, Toggle playback, exec, playerctl play-pause

# Night light (hyprsunset)
bindd = $mainMod, F8, Toggle night light, exec, desktopctl night-light toggle
bindd = $mainMod, F9, Return night light to auto, exec, desktopctl night-light auto

# Screenshot
bindd = $mainMod SHIFT, S, Screenshot selection to clipboard, exec, grim -g "$(slurp -d)" - | wl-copy
bindd = $mainMod, F10, Screenshot full output, exec, grim

# Lock
bindd = $mainMod, L, Lock session, exec, loginctl lock-session

bindd = $mainMod, Escape, Toggle power menu, exec, sh -lc 'qs -p "${DESKTOPCTL_REPO:-$HOME/repos/dotfiles}/config/quickshell" ipc call powermenu toggle'
bindd = $mainMod SHIFT, N, Toggle notifications drawer, exec, sh -lc 'qs -p "${DESKTOPCTL_REPO:-$HOME/repos/dotfiles}/config/quickshell" ipc call drawer toggle'

# Settings panel
bindd = $mainMod, T, Toggle settings, exec, sh -lc 'qs -p "${DESKTOPCTL_REPO:-$HOME/repos/dotfiles}/config/quickshell" ipc call settings toggle'

# Restart Quickshell
bindd = $mainMod SHIFT, Q, Restart Quickshell, exec, pkill quickshell || true; sleep 0.3; desktopctl launch-quickshell

# Window switcher (snappy-switcher)
bindd = ALT, Tab, Next item in switcher, exec, snappy-switcher next
bindd = ALT SHIFT, Tab, Previous item in switcher, exec, snappy-switcher prev

# Workspace overview (hyprexpo plugin)
bindd = $mainMod, grave, Toggle workspace overview, exec, hyprctl dispatch hyprexpo:expo toggle

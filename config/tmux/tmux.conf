# Prefix: Ctrl+a (easier than Ctrl+b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",alacritty:RGB,ghostty:RGB"
set -g escape-time 0

# Mouse
set -g mouse on

# History
set -g history-limit 50000

# Indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Splits (intuitive keys)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Navigate panes with Alt+arrow (no prefix)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# Status bar
set -g status-left-length 20

# Colors (generated by apply-theme)
source-file ~/.config/tmux/colors.conf
